<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: -apple-system, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; justify-content: center; height: 100vh; }
    #container { width: 100%; max-width: 600px; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
    input, button { padding: 12px; border-radius: 8px; border: none; font-size: 16px; margin-bottom: 10px; }
    input { background: #1e293b; color: white; width: 100%; box-sizing: border-box; }
    button { background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
    button:hover { background: #2563eb; }
    #msgs { flex-grow: 1; overflow-y: auto; background: #1e293b; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
    .msg { margin-bottom: 8px; border-bottom: 1px solid #334155; padding-bottom: 4px; }
  </style>
</head>
<body>

<div id="container">
  <div id="setup">
    <h2 style="text-align: center;">GRID Chat</h2>
    <input id="pwd" type="password" placeholder="Enter Room Password">
    <button style="width: 100%;" onclick="create()">Create Room</button>
    <button style="width: 100%;" onclick="join()">Join Room</button>
  </div>

  <div id="chat" style="display:none; flex-direction: column; height: 100%;">
    <div id="msgs"></div>
    <div style="display: flex; gap: 5px;">
      <input id="in" placeholder="Type a message...">
      <button onclick="send()">Send</button>
    </div>
  </div>
</div>

<script>
  const ws = new WebSocket(`ws://${location.host}`);
  const roomId = location.hash.substring(1);
  const msgs = document.getElementById('msgs');

  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if(msg.type === 'joined') {
      document.getElementById('setup').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      if(!roomId) location.hash = msg.id;
    }
    if(msg.type === 'chat') {
      msgs.innerHTML += `<div class="msg">${msg.text}</div>`;
      msgs.scrollTop = msgs.scrollHeight;
    }
    if(msg.type === 'error') alert(msg.message);
  };

  function create() { ws.send(JSON.stringify({type:'create', password: document.getElementById('pwd').value})); }
  function join() { ws.send(JSON.stringify({type:'join', id: roomId, password: document.getElementById('pwd').value})); }
  function send() { 
    const input = document.getElementById('in');
    ws.send(JSON.stringify({type:'chat', text: input.value})); 
    input.value=''; 
  }
</script>
</body>
</html>
